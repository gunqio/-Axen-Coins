name: Axen-US
on:
  workflow_dispatch:

jobs:
  Renew-bot:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/axen_coins.py axen_coins.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # ========== 代理安装（修复 + 启动） ==========
      - name: ⚙ 安装并启动代理 (sing-box)
        id: singbox
        env:
          NODE_LINK: ${{ secrets.US_PROXY }}
        run: |
          # 1. 下载并安装 sing-box（已修正 curl -L）
          bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh | sed 's/curl -s "/curl -sL "/g')

          # 2. 创建配置目录
          sudo mkdir -p /etc/sing-box

          # 3. 生成配置文件（如果订阅链接有效）
          if sudo sing-box generate config --from-subscription "$NODE_LINK" --output /etc/sing-box/config.json; then
            echo "订阅配置生成成功"
          else
            echo "订阅生成失败，尝试备用配置（需手动提供）"
            # 若失败，可在此使用预置配置或直接退出
            exit 1
          fi

          # 4. 确保 inbound 为 mixed（HTTP/SOCKS5）监听 127.0.0.1:1080
          # 使用 jq 添加 inbound（若无则添加）
          sudo jq '.inbounds = [{"type":"mixed","listen":"127.0.0.1","listen_port":1080}] + .inbounds' /etc/sing-box/config.json > /tmp/config.json && sudo mv /tmp/config.json /etc/sing-box/config.json

          # 5. 后台启动 sing-box
          sudo nohup sing-box run -c /etc/sing-box/config.json > sing-box.log 2>&1 &
          sleep 5

          # 6. 检查进程
          ps aux | grep sing-box | grep -v grep

          # 7. 输出代理地址供后续使用
          echo "PROXY_ADDR=127.0.0.1:1080" >> $GITHUB_ENV

      - name: 🛠️ 安装 proxychains
        if: ${{ steps.singbox.outcome == 'success' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y proxychains
          # 配置使用 SOCKS5 代理
          sudo sed -i 's/^socks4.*/socks5 127.0.0.1 1080/' /etc/proxychains.conf

      # ========== 测试代理是否生效（可选） ==========
      - name: 🌐 验证代理出口
        if: ${{ steps.singbox.outcome == 'success' }}
        run: |
          proxychains curl -s https://api.ip.sb/ip || echo "代理测试失败"

      # ========== 原有依赖安装步骤 ==========
      - name: 🛠️ 安装系统依赖
        if: ${{ steps.singbox.outcome == 'success' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot

      - name: 🐍 安装 Python 依赖
        if: ${{ steps.singbox.outcome == 'success' }}
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver

      # ========== 运行脚本（使用 proxychains） ==========
      - name: 🚀 运行脚本
        if: ${{ steps.singbox.outcome == 'success' }}
        env:
          PYTHONIOENCODING: utf-8
          AXEN_ACCOUNT: ${{ secrets.US_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
          CRON_JOB: ${{ secrets.US_CRON }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" proxychains python axen_coins.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"

      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --repo ${{ github.repository }} --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id --repo ${{ github.repository }} || true
            fi
          done
