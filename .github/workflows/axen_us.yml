name: Axen-US

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  Renew-bot:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/axen_coins.py axen_coins.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ============================================
      # 1️⃣ 安装 Chrome（直连，不走代理）
      # ============================================
      - name: 🛠️ 安装 Chrome
        uses: browser-actions/setup-chrome@latest
        env:
          http_proxy: ""
          https_proxy: ""
          ALL_PROXY: ""
          no_proxy: ""
        with:
          chrome-version: stable
          install-dependencies: false
          install-chromedriver: false
          no-sudo: false

      # ============================================
      # 2️⃣ 系统依赖（直连）
      # ============================================
      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb libnss3 libfontconfig1 libgbm1
          google-chrome --version

      # ============================================
      # 3️⃣ 安装 Python 依赖（直连）
      # ============================================
      - name: 🐍 安装 Python 依赖
        env:
          http_proxy: ""
          https_proxy: ""
          ALL_PROXY: ""
          no_proxy: ""
        run: |
          pip install --no-cache-dir seleniumbase requests

      # ============================================
      # 4️⃣ 安装 ChromeDriver（直连）
      # ============================================
      - name: 🔧 安装 ChromeDriver
        env:
          http_proxy: ""
          https_proxy: ""
          ALL_PROXY: ""
          no_proxy: ""
        run: |
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+' || echo "150.0.7871.115")
          echo "Chrome 版本: $CHROME_VERSION"
          seleniumbase install chromedriver ${CHROME_VERSION}
          chromedriver --version

      # ============================================
      # 5️⃣ 启动 sing-box 代理（支持 socks5/vless/vmess）
      # ============================================
      - name: 🚀 启动 sing-box 代理
        env:
          PROXY_LINK: ${{ secrets.US_PROXY }}
        run: |
          set +e
          if [ -z "$PROXY_LINK" ]; then
            echo "⏭️ US_PROXY 为空，跳过代理"
            echo "GOST_PROXY=" >> $GITHUB_ENV
            exit 0
          fi

          sudo apt-get update -qq
          sudo apt-get install -y -qq wget curl unzip

          VERSION="1.8.0"
          wget -q --timeout=60 --tries=3 "https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/sing-box-${VERSION}-linux-amd64.tar.gz" -O sing-box.tar.gz || \
          wget -q --timeout=60 --tries=3 "https://registry.npmmirror.com/-/binary/sing-box/${VERSION}/sing-box-${VERSION}-linux-amd64.tar.gz" -O sing-box.tar.gz

          if [ ! -s sing-box.tar.gz ]; then
            echo "⚠️ sing-box 下载失败，跳过代理"
            echo "GOST_PROXY=" >> $GITHUB_ENV
            exit 0
          fi

          tar -xzf sing-box.tar.gz
          mv sing-box-${VERSION}-linux-amd64/sing-box ./sing-box
          chmod +x ./sing-box

          # ========== 增强解析脚本（支持 socks5/vless/vmess） ==========
          cat > generate_config.py << 'EOF'
          import sys, json, base64, urllib.parse, os, re

          def b64_decode(data):
              data = re.sub(r'\s+', '', data)
              missing = len(data) % 4
              if missing:
                  data += '=' * (4 - missing)
              return base64.b64decode(data).decode('utf-8')

          def parse_socks5(url):
              parsed = urllib.parse.urlparse(url)
              if parsed.scheme != 'socks5':
                  return None
              host = parsed.hostname
              port = parsed.port or 1080
              username = parsed.username or ''
              password = parsed.password or ''
              out = {
                  "type": "socks",
                  "server": host,
                  "server_port": port,
              }
              if username and password:
                  out["username"] = username
                  out["password"] = password
              return out

          def parse_vless(url):
              parsed = urllib.parse.urlparse(url)
              uuid = parsed.username
              server = parsed.hostname
              port = parsed.port or 443
              params = dict(urllib.parse.parse_qsl(parsed.query))
              flow = params.get('flow', '')
              tls = params.get('security', '') in ['tls', 'reality'] or 'tls' in params
              sni = params.get('sni', '')
              fp = params.get('fp', '')
              out = {
                  "type": "vless",
                  "server": server,
                  "server_port": port,
                  "uuid": uuid,
                  "flow": flow,
              }
              if tls:
                  out["tls"] = {
                      "enabled": True,
                      "server_name": sni or server,
                      "utls": {"enabled": True, "fingerprint": fp or "chrome"}
                  }
              return out

          def parse_vmess(url):
              try:
                  b64_part = url.replace('vmess://', '').strip()
                  decoded = b64_decode(b64_part)
                  data = json.loads(decoded)
              except Exception as e:
                  print(f"❌ 解析 vmess 失败: {e}", file=sys.stderr)
                  sys.exit(1)
              out = {
                  "type": "vmess",
                  "server": data.get('add') or data.get('address', ''),
                  "server_port": int(data.get('port', 443)),
                  "uuid": data.get('id') or data.get('uuid', ''),
                  "security": data.get('scy', data.get('security', 'auto')),
                  "alter_id": int(data.get('aid', data.get('alterId', 0))),
              }
              tls_enabled = data.get('tls', '') in ['tls', 'reality', 'true', True]
              if tls_enabled:
                  out["tls"] = {
                      "enabled": True,
                      "server_name": data.get('sni', data.get('host', ''))
                  }
              transport = {}
              net = data.get('net', 'tcp')
              if net:
                  transport["type"] = net
              if data.get('path'):
                  transport["path"] = data['path']
              if data.get
