name: Axen-US

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  Renew-bot:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/axen_coins.py axen_coins.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ========== 代理步骤已移除，所有请求直连 ==========

      # ========== 安装 Chrome（直连） ==========
      - name: 🛠️ 安装 Chrome
        uses: browser-actions/setup-chrome@latest
        env:
          http_proxy: ""
          https_proxy: ""
          ALL_PROXY: ""
          no_proxy: ""
        with:
          chrome-version: stable
          install-dependencies: false
          install-chromedriver: false
          no-sudo: false

      # ========== 系统依赖 ==========
      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb libnss3 libfontconfig1 libgbm1
          google-chrome --version

      # ========== 安装 Python 依赖（直连） ==========
      - name: 🐍 安装 Python 依赖
        env:
          http_proxy: ""
          https_proxy: ""
          ALL_PROXY: ""
          no_proxy: ""
        run: |
          pip install --no-cache-dir seleniumbase requests

      # ========== 安装 ChromeDriver（直连） ==========
      - name: 🔧 安装 ChromeDriver
        env:
          http_proxy: ""
          https_proxy: ""
          ALL_PROXY: ""
          no_proxy: ""
        run: |
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+' || echo "150.0.7871.115")
          echo "Chrome 版本: $CHROME_VERSION"
          seleniumbase install chromedriver ${CHROME_VERSION}
          chromedriver --version

      # ========== 运行主脚本（直连，无代理环境变量） ==========
      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          AXEN_ACCOUNT: ${{ secrets.US_ACCOUNT }}
          # 不再传递 GOST_PROXY，脚本内 os.getenv('GOST_PROXY') 将返回 None
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          which chromedriver
          chromedriver --version
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python axen_coins.py

      # ========== 上传调试文件 ==========
      - name: 📸 上传截图和 HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            *.png
            *.html
          retention-days: 3

      # ========== 清理旧工作流运行记录 ==========
      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --repo ${{ github.repository }} --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 3 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id --repo ${{ github.repository }} || true
            fi
          done
