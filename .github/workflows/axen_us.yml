name: Axen-US

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  Renew-bot:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/axen_coins.py axen_coins.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛠️ 安装 Chrome
        uses: browser-actions/setup-chrome@latest
        env:
          http_proxy: ""
          https_proxy: ""
          ALL_PROXY: ""
          no_proxy: ""
        with:
          chrome-version: stable
          install-dependencies: false
          install-chromedriver: false
          no-sudo: false

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb libnss3 libfontconfig1 libgbm1
          google-chrome --version

      - name: 🐍 安装 Python 依赖
        env:
          http_proxy: ""
          https_proxy: ""
          ALL_PROXY: ""
          no_proxy: ""
        run: |
          pip install --no-cache-dir seleniumbase requests

      - name: 🔧 安装 ChromeDriver
        env:
          http_proxy: ""
          https_proxy: ""
          ALL_PROXY: ""
          no_proxy: ""
        run: |
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+' || echo "150.0.7871.115")
          echo "Chrome 版本: $CHROME_VERSION"
          seleniumbase install chromedriver ${CHROME_VERSION}
          chromedriver --version

      - name: 🚀 启动 sing-box 代理
        env:
          PROXY_LINK: ${{ secrets.US_PROXY }}
        run: |
          set +e
          if [ -z "$PROXY_LINK" ]; then
            echo "⏭️ US_PROXY 为空，跳过代理"
            echo "GOST_PROXY=" >> $GITHUB_ENV
            exit 0
          fi

          # 打印链接前 80 字符用于调试（脱敏）
          echo "PROXY_LINK 前 80 字符: ${PROXY_LINK:0:80}..."

          sudo apt-get update -qq
          sudo apt-get install -y -qq wget curl unzip

          VERSION="1.8.0"
          wget -q --timeout=60 --tries=3 "https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/sing-box-${VERSION}-linux-amd64.tar.gz" -O sing-box.tar.gz || \
          wget -q --timeout=60 --tries=3 "https://registry.npmmirror.com/-/binary/sing-box/${VERSION}/sing-box-${VERSION}-linux-amd64.tar.gz" -O sing-box.tar.gz

          if [ ! -s sing-box.tar.gz ]; then
            echo "⚠️ sing-box 下载失败，跳过代理"
            echo "GOST_PROXY=" >> $GITHUB_ENV
            exit 0
          fi

          tar -xzf sing-box.tar.gz
          mv sing-box-${VERSION}-linux-amd64/sing-box ./sing-box
          chmod +x ./sing-box

          # ========== 增强版 generate_config.py ==========
          cat > generate_config.py << 'EOF'
          import sys, json, base64, urllib.parse, os, re

          def b64_decode(data):
              # 移除空白字符（空格、换行、制表符）
              data = re.sub(r'\s+', '', data)
              # 补齐 padding
              missing = len(data) % 4
              if missing:
                  data += '=' * (4 - missing)
              return base64.b64decode(data).decode('utf-8')

          def parse_vmess(url):
              try:
                  b64_part = url.replace('vmess://', '').strip()
                  decoded = b64_decode(b64_part)
                  data = json.loads(decoded)
              except Exception as e:
                  print(f"❌ 解析 vmess 失败: {e}", file=sys.stderr)
                  sys.exit(1)

              # 提取字段，兼容不同命名
              add = data.get('add') or data.get('address', '')
              port = int(data.get('port', 443))
              uuid = data.get('id') or data.get('uuid', '')
              security = data.get('scy') or data.get('security', 'auto')
              aid = data.get('aid') or data.get('alterId', 0)
              net = data.get('net', 'tcp')
              path = data.get('path', '')
              host = data.get('host', '')
              tls = data.get('tls', '') in ['tls', 'reality', 'true', True]
              sni = data.get('sni') or host
              fp = data.get('fp', 'chrome')

              outbound = {
                  "type": "vmess",
                  "server": add,
                  "server_port": port,
                  "uuid": uuid,
                  "security": security,
                  "alter_id": int(aid),
              }
              # TLS 配置
              if tls:
                  outbound["tls"] = {
                      "enabled": True,
                      "server_name": sni,
                      "utls": {"enabled": True, "fingerprint": fp}
                  }
              # 传输层配置
              if net != 'tcp' or path or host:
                  transport = {"type": net}
                  if path:
                      transport["path"] = path
                  if host:
                      transport["host"] = host
                      transport["headers"] = {"Host": host}
                  outbound["transport"] = transport

              return outbound

          link = os.getenv('PROXY_LINK')
          if not link:
              print("❌ PROXY_LINK 环境变量为空", file=sys.stderr)
              sys.exit(1)

          link = link.strip()
          if link.startswith('vless://'):
              # 省略 vless 解析，若需要可自行添加，但您用的是 vmess
              print("❌ vless 解析未实现", file=sys.stderr)
              sys.exit(1)
          elif link.startswith('vmess://'):
              out = parse_vmess(link)
          else:
              print(f"❌ 不支持的代理协议: {link[:20]}", file=sys.stderr)
              sys.exit(1)

          config = {
              "log": {"level": "info"},
              "inbounds": [
                  {"type": "socks", "tag": "socks-in", "listen": "127.0.0.1", "port": 1080},
                  {"type": "http", "tag": "http-in", "listen": "127.0.0.1", "port": 1081}
              ],
              "outbounds": [out]
          }
          with open('config.json', 'w') as f:
              json.dump(config, f, indent=2)
          print("✅ config.json 生成成功")
          EOF

          # 执行生成
          python3 generate_config.py 2> parse_error.log
          if [ $? -ne 0 ]; then
              echo "⚠️ 解析代理链接失败，错误信息:"
              cat parse_error.log
              echo "⚠️ 跳过代理设置"
              echo "GOST_PROXY=" >> $GITHUB_ENV
              exit 0
          fi

          # 启动 sing-box
          nohup ./sing-box run -c config.json > /tmp/sing-box.log 2>&1 &
          sleep 5

          # 验证代理
          if curl -s -x http://127.0.0.1:1080 -I https://google.com --max-time 10; then
            echo "✅ sing-box 代理验证成功"
            echo "GOST_PROXY=http://127.0.0.1:1080" >> $GITHUB_ENV
            echo "ALL_PROXY=http://127.0.0.1:1080" >> $GITHUB_ENV
            echo "http_proxy=http://127.0.0.1:1080" >> $GITHUB_ENV
            echo "https_proxy=http://127.0.0.1:1080" >> $GITHUB_ENV
            echo "no_proxy=localhost,127.0.0.1" >> $GITHUB_ENV
          else
            echo "⚠️ 代理验证失败，跳过代理设置"
            pkill -f sing-box || true
            echo "GOST_PROXY=" >> $GITHUB_ENV
          fi
          set -e

      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          AXEN_ACCOUNT: ${{ secrets.US_ACCOUNT }}
          GOST_PROXY: ${{ env.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          which chromedriver
          chromedriver --version
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python axen_coins.py

      - name: 📸 上传截图和 HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            *.png
            *.html
          retention-days: 3

      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --repo ${{ github.repository }} --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 3 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id --repo ${{ github.repository }} || true
            fi
          done
