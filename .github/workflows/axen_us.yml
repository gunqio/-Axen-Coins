name: Axen-US

on:
  workflow_dispatch:

jobs:
  Renew-bot:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/axen_coins.py axen_coins.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: ⚙ 设置 GOST 代理转发
        env:
          NODE_LINK: ${{ secrets.US_PROXY }}
        run: |
          if [ -z "$NODE_LINK" ]; then
            echo "US_PROXY 为空，跳过代理"
            # 不 exit，让后续步骤仍然可以运行（如果不走代理）
            # exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y wget

          VERSION="2.11.5"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost-linux-amd64-${VERSION}.gz"
          gunzip -f "gost-linux-amd64-${VERSION}.gz"
          chmod +x "gost-linux-amd64-${VERSION}"
          mv "gost-linux-amd64-${VERSION}" gost

          # 如果 NODE_LINK 存在且是 socks5:// 形式，转成 gost 需要的 socks5+
          ARGS="$NODE_LINK"
          if [ -n "$NODE_LINK" ] && [[ "$ARGS" == "socks5://"* ]]; then
            ARGS=$(echo "$ARGS" | sed 's|socks5://|socks5+|')
          fi

          if [ -n "$NODE_LINK" ]; then
            echo "GOST 目标: $ARGS"
            ./gost -L=:1080 -F "$ARGS" > /tmp/gost.log 2>&1 &
            sleep 3

            # 检查 gost 是否监听成功
            if ! ss -nltp | grep -q ':1080'; then
              echo "❌ GOST 未正常启动，日志："
              cat /tmp/gost.log
              exit 1
            fi

            echo "ALL_PROXY=http://127.0.0.1:1080" >> $GITHUB_ENV
            echo "http_proxy=http://127.0.0.1:1080" >> $GITHUB_ENV
            echo "https_proxy=http://127.0.0.1:1080" >> $GITHUB_ENV
            echo "no_proxy=localhost,127.0.0.1" >> $GITHUB_ENV

            echo "✅ GOST 代理已启动: http://127.0.0.1:1080"
          else
            echo "⚠️ 未配置代理，后续步骤将直接访问网络"
          fi

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot

      - name: 🐍 安装 Python 依赖
        timeout-minutes: 5
        run: |
          pip install seleniumbase
          # 不再执行：seleniumbase install chromedriver
          # 让 SeleniumBase 在运行时自动管理 ChromeDriver

      - name: 🚀 运行脚本
        timeout-minutes: 10
        env:
          PYTHONIOENCODING: utf-8
          AXEN_ACCOUNT: ${{ secrets.US_ACCOUNT }}
          PROXY_SERVER: http://127.0.0.1:1080
          TG_BOT: ${{ secrets.TG_BOT }}
          CRON_JOB: ${{ secrets.US_CRON }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python axen_coins.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"

      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --repo ${{ github.repository }} --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id --repo ${{ github.repository }} || true
            fi
          done
